name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: danbalogun/devops-portfolio

jobs:
  # ── Job 1: Run Tests ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest app/test_app.py -v

  # ── Job 2: Build & Push Docker Image ─────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ── Job 3: Deploy to Kubernetes ───────────────────────────────
  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    needs: build  # only runs if build passes
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config set-cluster default --insecure-skip-tls-verify=true

      - name: Update image tag
        run: |
          sed -i "s|danbalogun/devops-portfolio:latest|danbalogun/devops-portfolio:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Deploy to cluster
        run: |
          kubectl apply -f k8s/deployment.yaml --validate=false
          kubectl rollout status deployment/flask-app --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get svc
